<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Viện Sách Hà Nội</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --red: #C0392B;
    --red-light: #F5DEDD;
  .cat-tabs {
    display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0; padding: 11px 14px;
    font-size: 12.5px; font-weight: 500; color: rgba(255,255,255,0.5);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .cat-tab.active { color: white; border-bottom-color: var(--red); }
  .cat-tab:hover { color: rgba(255,255,255,0.85); }

  .main { padding: 20px 16px 80px; max-width: 680px; margin: 0 auto; }

  .section-title {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; margin-top: 4px;
  }
  .section-title h2 { font-size: 16px; font-weight: 700; color: var(--ink); }
  .section-title .count {
    background: var(--red-light); color: var(--red);
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    padding: 0 0 40px;
    animation: slideUp 0.3s ease;
    position: relative;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header { padding: 16px 16px 0; }
  .modal-cat { font-size: 11px; color: var(--red); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.3; color: var(--ink); margin-bottom: 12px; }
  .modal-cover-row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 0 16px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-cover {
    width: 80px; height: 108px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    position: relative; overflow: hidden; box-shadow: 4px 4px 16px rgba(0,0,0,0.15);
  }
  .modal-cover::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: rgba(0,0,0,0.15);
  }
  .modal-quick-info { flex: 1; }
  .modal-quick-info p { font-size: 13px; color: var(--ink-mid); line-height: 1.6; margin-bottom: 8px; }

  /* BOOK META INFO */
  .book-meta-info {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }
  .meta-tag {
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11px; color: var(--ink-mid); padding: 3px 8px;
    border-radius: 6px; display: flex; align-items: center; gap: 4px;
  }

  /* AUDIO PLAYER */
  .audio-section {
    margin: 14px 16px; background: var(--ink); border-radius: 12px; padding: 14px; color: white;
  }
  .audio-title { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .audio-controls { display: flex; align-items: center; gap: 12px; }
  .play-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--red);
    border: none; color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.15s, background 0.15s;
  }
  .play-btn:hover { transform: scale(1.07); background: #a93226; }
  .audio-info { flex: 1; }
  .audio-progress {
    height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin-bottom: 6px; overflow: hidden;
  }
  .audio-progress-fill { height: 100%; background: var(--red); width: 0%; border-radius: 2px; transition: width 0.3s; }
  .audio-time { font-size: 11px; color: rgba(255,255,255,0.4); }
  .audio-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; line-height: 1.5; }

  /* QR SECTION */
  .qr-section {
    margin: 0 16px 14px;
    background: linear-gradient(135deg, var(--gold-light), #FFF9F0);
    border: 1px solid #E8D5A3;
    border-radius: 12px; padding: 14px;
    display: flex; align-items: center; gap: 14px;
  }
  .qr-box {
    width: 80px; height: 80px; flex-shrink: 0;
    background: white; border-radius: 8px; padding: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .qr-box canvas, .qr-box img { width: 72px !important; height: 72px !important; }
  .qr-info { flex: 1; }
  .qr-title { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .qr-desc { font-size: 12px; color: var(--ink-mid); line-height: 1.5; }
  .qr-url { font-size: 10px; color: var(--ink-soft); margin-top: 4px; word-break: break-all; }

  /* CONTENT */
  .content-section { padding: 0 16px; }
  .content-label {
    font-size: 12px; color: var(--ink-soft); text-transform: uppercase;
    letter-spacing: 0.6px; font-weight: 600; margin-bottom: 10px; margin-top: 16px;
  }
  .content-text { font-size: 13.5px; color: var(--ink-mid); line-height: 1.85; }
  .content-text p { margin-bottom: 14px; }
  .content-text strong { color: var(--ink); font-weight: 600; }

  /* HIGHLIGHTS BOX */
  .highlights-box {
    background: var(--red-light); border-left: 3px solid var(--red);
    border-radius: 0 8px 8px 0; padding: 12px 14px; margin-bottom: 14px;
    font-size: 13px; color: var(--ink-mid); line-height: 1.7;
  }
  .highlights-box .hl-title {
    font-size: 11px; font-weight: 700; color: var(--red);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .highlights-box ul { padding-left: 16px; }
  .highlights-box li { margin-bottom: 4px; }

  /* MODAL ACTIONS */
  .modal-actions { display: flex; gap: 8px; padding: 16px; margin-top: 4px; }
  .action-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid var(--border);
    background: none; font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    color: var(--ink-mid); transition: all 0.15s;
  }
  .action-btn:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .action-btn.fav-active { background: var(--red-light); border-color: var(--red); color: var(--red); }

  .close-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%; background: var(--border);
    border: none; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--ink-mid);
    z-index: 10;
  }

  /* DIVIDER */
  .section-divider {
    height: 1px; background: var(--border); margin: 4px 16px 14px;
button>
        <div class="book-meta-info" id="mMeta"></div>
      </div>
    </div>

    <!-- AUDIO -->
    <div class="audio-section">
      <div class="audio-title">🎵 Nghe Sách</div>
      <div class="audio-controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="audio-info">
          <div class="audio-progress"><div class="audio-progress-fill" id="progressFill"></div></div>
          <div class="audio-time" id="audioTime">Chạm ▶ để nghe thử</div>
        </div>
      </div>
      <div class="audio-note">💡 Để nghe đầy đủ: tải file MP3 lên Google Drive → dán link vào đây.</div>
    </div>

    <!-- QR CODE -->
    <div class="qr-section">
      <div class="qr-box" id="qrContainer"></div>
      <div class="qr-info">
        <div class="qr-title">📱 Mã QR – Chia Sẻ Sách</div>
        <div class="qr-desc">Quét mã để mở trang thư viện trên điện thoại hoặc chia sẻ với bạn bè.</div>
        <div class="qr-url" id="qrUrl"></div>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- CONTENT -->
    <div class="content-section">
      <div class="content-label">📖 Nội Dung Tóm Tắt Chi Tiết</div>
      <div id="mHighlights"></div>
      <div class="content-text" id="mContent"></div>
    </div>

    <div class="modal-actions">
      <button class="action-btn" id="favModalBtn" onclick="toggleFavModal()">🤍 Yêu thích</button>
      <button class="action-btn" onclick="shareBook()">📤 Chia sẻ</button>
    </div>
  </div>
</div>

<script>
const BOOKS = [
  // ── I. LỊCH SỬ ──
  {
    id: 1, cat: "Lịch Sử", emoji: "🏛️",
    color: "#C0392B", bg: "#FDECEA",
    title: "Vang Bóng Một Thời",
    author: "Nguyễn Tuân", year: "1940", pages: "180 trang",

    desc: "Bức tranh hoài cổ về những nét đẹp văn hóa của người Việt xưa qua ngòi bút tài hoa Nguyễn Tuân.",
    highlights: ["Tác phẩm đỉnh cao của văn xuôi lãng mạn Việt Nam", "Khắc họa 13 truyện về phong tục, thú vui tao nhã", "Ngôn ngữ giàu nhạc điệu, hình ảnh tinh tế"],
    content: `<p><strong>Tổng quan:</strong> "Vang Bóng Một Thời" là tập truyện ngắn xuất bản năm 1940, được coi là đỉnh cao trong sự nghiệp văn học của Nguyễn Tuân và là một trong những tác phẩm văn xuôi Việt Nam đẹp nhất thế kỷ 20.</p>
    <p><strong>Nội dung 13 truyện:</strong> Mỗi truyện là một bức tranh sinh động về thú chơi, phong tục của người xưa: uống trà, thưởng hương, chơi chữ, thả thơ, đánh thơ, chọi gà... Tất cả đều mang vẻ đẹp tao nhã, tinh tế của người Hà Nội thời trước.</p>
    <p><strong>Nhân vật đặc sắc:</strong> Huấn Cao trong "Chữ người tử tù" – người tử tù viết chữ đẹp như rồng bay phượng múa, sáng tác tác phẩm thư pháp cuối đời ngay trong ngục tối – là hình ảnh bất hủ về cái đẹp thuần khiết không bị khuất phục trước cường quyền.</p>
    <p><strong>Thú uống trà:</strong> Trong "Những chiếc ấm đất", Nguyễn Tuân mô tả nghệ thuật pha trà cổ truyền: nước giếng Hoa Nam, ấm Thế Đức, chén Thanh Hóa – một triết lý sống chậm, thưởng thức trọn vẹn từng khoảnh khắc.</p>
    <p><strong>Ngôn ngữ:</strong> Văn Nguyễn Tuân giàu từ Hán Việt, dùng nhiều điển tích, hình ảnh ước lệ nhưng lại rất sống động và chính xác – phong cách "tài tử ngông nghênh" độc đáo không ai bắt chước được.</p>
    <p><strong>Giá trị:</strong> Cuốn sách không chỉ là văn học mà còn là tư liệu văn hóa quý về những phong tục đẹp đang dần mai một của người Việt xưa.</p>`
  },
  {
    id: 2, cat: "Lịch Sử", emoji: "🏛️",
    color: "#C0392B", bg: "#FDECEA",
    title: "Thăng Long – Hà Nội Ngàn Năm Văn Hiến",
    author: "Nhiều tác giả", year: "2010", pages: "420 trang",
    quick: "Công trình nghiên cứu lịch sử về kinh đô nghìn tuổi",
    desc: "Cái nhìn toàn cảnh về hành trình 1.000 năm của mảnh đất Thăng Long từ thuở khai thiên lập địa đến Hà Nội hiện đại.",
    highlights: ["Bản đồ cổ và hình ảnh di tích phong phú", "Phân tích lịch sử qua các triều đại Lý, Trần, Lê, Nguyễn", "Nguồn tư liệu học giả Pháp thời thuộc địa"],
    content: `<p><strong>Tổng quan:</strong> Cuốn sách là công trình nghiên cứu công phu, tập hợp nhiều bài viết chuyên sâu về lịch sử hình thành và phát triển của vùng đất Thăng Long – Hà Nội suốt chiều dài ngàn năm.</p>
    <p><strong>Dời đô năm 1010:</strong> Vua Lý Thái Tổ nhìn thấy rồng vàng bay lên từ vùng đất Đại La – điềm lành khiến ông quyết định dời đô từ Hoa Lư ra đây, đặt tên là Thăng Long (rồng bay lên). Quyết định lịch sử này định hình hơn 1.000 năm phát triển của dân tộc.</p>
    <p><strong>Qua các triều đại:</strong> Từ kinh thành nhỏ bé thời Lý đến đại đô hội thời Lê sơ với 36 phố phường sầm uất – mỗi triều đại để lại dấu ấn kiến trúc và văn hóa riêng trên mảnh đất thiêng.</p>
    <p><strong>Thời Pháp thuộc:</strong> Hà Nội biến đổi drastic từ 1883 – đường phố Âu hóa, công trình Pháp mọc lên, nhưng 36 phố phường vẫn giữ được nhịp sống truyền thống.</p>
    <p><strong>Tư liệu quý hiếm:</strong> Sách bao gồm bản đồ cổ từ thế kỷ 15-19, hình ảnh di tích, và những ghi chép của các học giả người Pháp thời thuộc địa – nguồn tư liệu quý giúp người đọc hình dung Hà Nội của các thế kỷ trước.</p>
    <p><strong>Giá trị:</strong> Đây là tài liệu tham khảo không thể thiếu cho ai muốn hiểu sâu về bản sắc văn hóa và địa chính trị của thủ đô Việt Nam.</p>`
  },
  {
    id: 3, cat: "Lịch Sử", emoji: "🏙️",
    color: "#C0392B", bg: "#FDECEA",
    title: "Hà Nội Thời Cận Đại",
    author: "Nguyễn Thừa Hỷ", year: "2012", pages: "350 trang",
    quick: "Biến đổi đô thị Hà Nội từ 1873 đến 1954",
    desc: "Nghiên cứu toàn diện về quá trình đô thị hóa và Âu hóa của Hà Nội dưới thời Pháp thuộc – từ kinh thành phong kiến đến thành phố thuộc địa hiện đại.",
    highlights: ["Quy hoạch đô thị kiểu Pháp thế kỷ 19-20", "Hệ thống công trình Pháp còn tồn tại đến nay", "Đời sống kinh tế – xã hội thời thuộc địa"],
    content: `<p><strong>Tổng quan:</strong> Cuốn sách lấp đầy khoảng trống trong lịch sử Hà Nội – giai đoạn từ khi Pháp chiếm Hà Nội (1873) đến chiến thắng Điện Biên Phủ (1954), một thời kỳ biến đổi sâu sắc và phức tạp nhất của thành phố.</p>
    <p><strong>Quy hoạch Pháp:</strong> Sau khi chiếm đóng, người Pháp triển khai kế hoạch quy hoạch lại Hà Nội theo kiểu Âu châu – phá bỏ nhiều công trình cổ, xây dựng hệ thống đường thẳng, công trình hành chính, nhà ga, bệnh viện. Những con phố như Tràng Tiền, Đinh Tiên Hoàng hình thành từ thời kỳ này.</p>

    <p><strong>Xã hội hai tầng:</strong> Sự phân tách giữa khu phố Tây (Hoàn Kiếm) và phố Ta (36 phố phường) tạo ra một Hà Nội hai tốc độ – một bên hiện đại hóa nhanh chóng, một bên vẫn giữ nhịp sống truyền thống.</p>
    <p><strong>Phong trào yêu nước:</strong> Bối cảnh thuộc địa cũng là nơi nảy sinh các phong trào Đông Kinh Nghĩa Thục, Đông Du, và sau này là Việt Minh – Hà Nội là trái tim của phong trào giải phóng dân tộc.</p>
    <p><strong>Giá trị thực tiễn:</strong> Hiểu lịch sử cận đại giúp người đọc lý giải được tại sao Hà Nội có cấu trúc đô thị như hiện nay – sự chồng chéo giữa không gian truyền thống và di sản thuộc địa.</p>`

    content: `<p><strong>Tổng quan:</strong> Cuốn sách tập hợp hồi ký, tư liệu và phân tích lịch sử về Hà Nội trong 8 năm kháng chiến chống Pháp (1946-1954) – giai đoạn bi tráng nhất trong lịch sử thủ đô.</p>
    <p><strong>Đêm 19/12/1946:</strong> Lời kêu gọi toàn quốc kháng chiến của Hồ Chủ tịch vang lên – đêm đó, tiếng súng nổ khắp Hà Nội, mở đầu cho 60 ngày đêm chiến đấu trong lòng thành phố. Trung đoàn Thủ đô "Quyết tử để Tổ quốc quyết sinh" đã viết nên huyền thoại.</p>
    <p><strong>Chiến thuật đường phố:</strong> Bộ đội và tự vệ thành đào hào, đục tường để di chuyển từ nhà này sang nhà khác mà không cần ra đường. Mỗi ngôi nhà trở thành một pháo đài nhỏ, mỗi con phố là một chiến trường.</p>
    <p><strong>Hà Nội vùng tạm chiếm:</strong> Khi lực lượng kháng chiến rút ra ngoài, Hà Nội sống dưới ách chiếm đóng nhưng tinh thần kháng cự không bao giờ tắt – những câu chuyện về mạng lưới nội gián, in ấn truyền đơn bí mật và nuôi giấu cán bộ.</p>
    <p><strong>Ngày tiếp quản 10/10/1954:</strong> Sau chiến thắng Điện Biên Phủ, Hà Nội được giải phóng. Sách ghi lại không khí ngày lịch sử đó qua ký ức của những người trong cuộc – niềm vui, nước mắt và cả những cuộc chia ly.</p>
    <p><strong>Nhân chứng lịch sử:</strong> Cuốn sách là kho lưu trữ quý báu những lời kể của các nhân chứng trực tiếp – nhiều người đã không còn sống đến nay.</p>`
  },
  {
    id: 5, cat: "Lịch Sử", emoji: "📜",
    color: "#C0392B", bg: "#FDECEA",
    title: "Búp Sen Xanh",
    author: "Sơn Tùng", year: "1982", pages: "340 trang",
    quick: "Tiểu thuyết lịch sử về tuổi thơ Bác Hồ",
    desc: "Cuốn tiểu thuyết tái hiện những năm tháng thiếu thời của Nguyễn Sinh Cung – người sau này trở thành Chủ tịch Hồ Chí Minh.",
    highlights: ["Nghiên cứu điền dã nhiều năm của tác giả Sơn Tùng", "Bức tranh xã hội Việt Nam cuối thế kỷ 19", "Hành trình từ làng Sen đến Huế và Nam Bộ"],
    content: `<p><strong>Tổng quan:</strong> "Búp Sen Xanh" của nhà văn Sơn Tùng (xuất bản 1982) là cuốn tiểu thuyết lịch sử nổi tiếng nhất về thời thơ ấu và thanh niên của Chủ tịch Hồ Chí Minh – được tái bản hàng chục lần và dịch ra nhiều thứ tiếng.</p>
    <p><strong>Tên sách – ý nghĩa:</strong> "Búp sen xanh" là ẩn dụ về cậu bé Nguyễn Sinh Cung – thuần khiết, tiềm ẩn, chưa nở hết. Hình ảnh hoa sen – loài hoa "gần bùn mà chẳng hôi tanh mùi bùn" – phản chiếu số phận người lớn lên trong nghèo khó nhưng giữ trọn phẩm giá.</p>
    <p><strong>Tuổi thơ ở làng Sen:</strong> Cậu bé Cung lớn lên trong gia đình nhà Nho nghèo ở Nam Đàn, Nghệ An – cha là Nguyễn Sinh Sắc (sau này đỗ Phó bảng), một người có tư tưởng yêu nước và khẳng khái. Tuổi thơ nghèo khổ nhưng đầy ắp tình yêu thương và lý tưởng.</p>
    <p><strong>Vào Huế:</strong> Theo cha vào Huế năm 1906, cậu Nguyễn Tất Thành (tên mới) học trường Quốc Học – nơi đào tạo nhiều nhân tài của đất nước. Chứng kiến cảnh người Pháp hành hạ dân Việt, lý tưởng đấu tranh dần hình thành.</p>
    <p><strong>Vào Nam và ra đi:</strong> Năm 1911, Nguyễn Tất Thành rời cảng Nhà Rồng (Sài Gòn) trên tàu Latouche-Tréville để bắt đầu hành trình 30 năm tìm đường cứu nước – khoảnh khắc lịch sử được tái hiện đầy xúc động.</p>
    <p><strong>Giá trị tư liệu:</strong> Sơn Tùng đã đi hàng nghìn kilômét, gặp hàng trăm nhân chứng để viết cuốn sách này – nhiều chi tiết không thể tìm thấy ở bất kỳ tài liệu lịch sử nào khác.</p>`
  },
  {
    id: 6, cat: "Lịch Sử", emoji: "🛤️",
    color: "#C0392B", bg: "#FDECEA",
    title: "Vừa Đi Đường Vừa Kể Chuyện",
    author: "T. Lan (Hồ Chí Minh)", year: "1963", pages: "120 trang",
    quick: "Hồi ký ngắn của Bác Hồ về những năm tháng hoạt động bí mật",
    desc: "Cuốn hồi ký do chính Chủ tịch Hồ Chí Minh viết dưới bút danh T. Lan, kể về những chuyến đi bí mật và hoạt động cách mạng đầy gian khổ.",
    highlights: ["Bút danh T. Lan – bí danh hiếm gặp của Bác", "Những giai thoại thú vị về hoạt động bí mật", "Văn phong giản dị, chân thực của người lãnh tụ"],
    content: `<p><strong>Tổng quan:</strong> Đây là cuốn sách hiếm gặp – được viết bởi chính Hồ Chí Minh dưới bút danh T. Lan, kể về những chuyến đi và hoạt động bí mật của Người trong giai đoạn đầu cuộc kháng chiến chống Pháp.</p>
    <p><strong>Bút danh T. Lan:</strong> Hồ Chí Minh dùng hàng trăm bút danh trong cuộc đời – T. Lan là một trong số ít được dùng khi viết về chính bản thân mình, tạo cảm giác khách quan và khiêm tốn đặc trưng.</p>
    <p><strong>Những chuyến đi bí mật:</strong> Bác kể về việc vượt rừng, leo núi, qua biên giới dưới nhiều vỏ bọc – lúc là thầy tu, lúc là người buôn thuốc lào, lúc là ông già chài lưới. Mỗi câu chuyện đều thể hiện sự linh hoạt, bình tĩnh và óc hài hước của Người.</p>
    <p><strong>Gian khổ và lạc quan:</strong> Bắt giam ở Quảng Tây (Trung Quốc) suốt 14 tháng trong điều kiện khắc nghiệt, nhưng Bác vẫn làm thơ và học thêm tiếng Hán. "Kiên nhẫn chịu đựng gian khổ, Giúp hoàn thành được việc lớn" – tinh thần đó thấm đẫm từng trang sách.</p>
    <p><strong>Văn phong đặc sắc:</strong> Khác với nhiều sách chính trị khô khan, văn Bác Hồ trong cuốn này rất giản dị, dí dỏm, gần gũi – phản ánh phong cách của một người từng trải, yêu đời và hiểu sâu tâm lý con người.</p>
    <p><strong>Bài học:</strong> Cuốn sách dạy về sự kiên trì, linh hoạt và lạc quan trước khó khăn – những phẩm chất không chỉ cần cho người làm cách mạng mà có giá trị với tất cả mọi người.</p>`
  },

    desc: "Tập tản văn bất hủ của Vũ Bằng về những món ăn Hà Nội – được viết từ Sài Gòn với nỗi nhớ thương da diết miền Bắc.",
    highlights: ["Viết từ Sài Gòn sau 1954 – nỗi nhớ Hà Nội thống thiết", "Mỗi món ăn gắn với một ký ức, một mùa, một người", "Văn phong trữ tình, đẹp như thơ"],
    content: `<p><strong>Tổng quan:</strong> "Miếng Ngon Hà Nội" (1960) của Vũ Bằng không chỉ là sách ẩm thực – đây là tác phẩm văn học đỉnh cao, được viết từ Sài Gòn sau khi tác giả tập kết vào Nam, với nỗi nhớ Hà Nội và miền Bắc thống thiết khôn nguôi.</p>
    <p><strong>Bối cảnh sáng tác:</strong> Năm 1954, đất nước chia đôi, Vũ Bằng phải ở lại miền Nam trong tư cách điệp viên bí mật. Xa Hà Nội, ông viết về những món ăn như một cách để sống lại quê hương – mỗi trang văn là một cuộc hành hương về ký ức.</p>
    <p><strong>Những món ngon đặc sắc:</strong> Phở Hà Nội (phở Nam không thể so sánh được), bún chả, bún ốc, bánh cuốn Thanh Trì, cốm làng Vòng, kem Hồng Vân, bánh cốm Hàng Than – mỗi món được miêu tả với độ chính xác tuyệt vời về màu sắc, hương vị, cách thưởng thức.</p>
    <p><strong>Triết lý ăn uống:</strong> Vũ Bằng không chỉ mô tả món ăn mà còn lý giải tại sao người Hà Nội ăn khác – sự tinh tế trong cách chọn nguyên liệu, cách chế biến, cách thưởng thức theo mùa, theo giờ, theo không gian.</p>
    <p><strong>Ký ức và hoài niệm:</strong> "Ăn một miếng bánh cuốn Thanh Trì mà nhớ cả một mùa đông Hà Nội" – văn Vũ Bằng có khả năng kỳ diệu là biến thức ăn thành cảm xúc, biến ẩm thực thành thi ca.</p>
    <p><strong>Di sản:</strong> Cuốn sách được tái bản liên tục từ 1975 đến nay – bằng chứng của một kiệt tác không bao giờ lỗi thời.</p>`
  },
  {
    id: 8, cat: "Văn Hóa", emoji: "🎨",
    color: "#2980B9", bg: "#EAF4FB",
    title: "Thú Chơi Của Người Hà Nội",
    author: "Băng Sơn", year: "1993", pages: "250 trang",
    quick: "Những thú vui tao nhã của người Hà Nội xưa",
    desc: "Khảo cứu về những thú chơi thanh cao đặc trưng của người Hà Nội – từ chơi chim, chơi cá đến chơi lan, chơi cây cảnh và những trò chơi dân gian tinh tế.",
    highlights: ["Nghệ thuật chơi chim, chơi cá vàng người Hà Nội", "Thú chơi lan, cây cảnh theo mùa", "Trò chơi dân gian đang dần thất truyền"],
    content: `<p><strong>Tổng quan:</strong> Nhà văn Băng Sơn – người dành cả đời nghiên cứu văn hóa Hà Nội – ghi lại trong cuốn sách này những thú chơi tao nhã đang dần thất truyền của người Hà Nội xưa.</p>
    <p><strong>Thú chơi chim:</strong> Người Hà Nội xưa nuôi chim không để ăn mà để nghe hót – chào mào, họa mi, sơn ca, vành khuyên. Nghệ thuật luyện chim, làm lồng chim (lồng Vác nổi tiếng thiên hạ), chọn chim đều đòi hỏi kiến thức sâu và tâm huyết lớn.</p>
    <p><strong>Chơi cá vàng:</strong> Cá vàng Hồ Tây nổi tiếng khắp Đông Dương – những con cá được lai tạo qua nhiều thế hệ để có màu sắc và hình dạng độc đáo. Thú chơi cá vàng là nghệ thuật kết hợp giữa thiên nhiên và bàn tay người.</p>
    <p><strong>Chơi lan:</strong> Người Hà Nội mê hoa lan – đặc biệt là lan kiếm, lan bạch và lan hồ điệp. Mỗi chậu lan được chăm bẵm như báu vật, và việc lan nở vào đúng dịp Tết là niềm hạnh phúc lớn.</p>
    <p><strong>Thú chơi đá:</strong> Sưu tầm đá cảnh – những viên đá kỳ hình dị dạng từ suối, sông – là thú chơi của các bậc văn nhân. Mỗi viên đá là một tác phẩm thiên nhiên được đặt vào khung cảnh phù hợp.</p>
    <p><strong>Cờ tướng, đánh cờ:</strong> Các quán cà phê và góc phố Hà Nội xưa luôn có người ngồi đánh cờ – thú chơi trí tuệ này là không gian xã hội quan trọng của đàn ông Hà Nội.</p>
    <p><strong>Bảo tồn:</strong> Sách đặt câu hỏi về cách gìn giữ những thú chơi này trong thời đại số hóa – khi người trẻ ít có thời gian và kiên nhẫn để theo đuổi những niềm vui chậm rãi.</p>`
  },
  {
    id: 9, cat: "Văn Hóa", emoji: "🌸",
    color: "#2980B9", bg: "#EAF4FB",
    title: "Hà Nội Băm Sáu Phố Phường",
    author: "Thạch Lam", year: "1943", pages: "150 trang",
    quick: "Ký ức phố cổ qua ngòi bút Thạch Lam",
    desc: "Tác phẩm bất hủ của Thạch Lam về 36 phố phường Hà Nội – mỗi con phố một nghề, một hương, một ký ức không thể quên.",
    highlights: ["Xuất bản 1943 – áng văn xuôi đẹp nhất về phố cổ", "Miêu tả ẩm thực đường phố như một nghệ thuật", "Văn phong trong sáng, thơ mộng của Thạch Lam"],
    content: `<p><strong>Tổng quan:</strong> Xuất bản lần đầu năm 1943, "Hà Nội Băm Sáu Phố Phường" của Thạch Lam là áng văn xuôi đẹp nhất viết về phố cổ Hà Nội – cho đến nay vẫn chưa có tác phẩm nào vượt qua được về cả văn chương lẫn giá trị tư liệu.</p>
    <p><strong>Khu phố cổ sống động:</strong> Mỗi con phố – Hàng Đào buôn lụa đỏ, Hàng Ngang bán hàng tạp hóa, Hàng Bạc làm đồ bạc, Hàng Thiếc đóng ấm – được khắc họa như một nhân vật sống động với hương thơm, âm thanh và những con người gắn bó cả đời với nghề tổ.</p>
    <p><strong>Những món ngon huyền thoại:</strong> Bánh cuốn Thanh Trì ("mỏng như tờ giấy pơ luya, trắng như tuyết, mềm như lụa"), bún thang Hàng Hành, cốm làng Vòng ("hương cốm là hương lúa non chưa chín, phảng phất khói lam và hơi nước mùa thu"), bánh cốm Hàng Than – Thạch Lam viết về ẩm thực như một triết gia.</p>
    <p><strong>Nhịp sống phố cổ:</strong> Sáng sớm tiếng rao hàng, chiều tối ánh đèn dầu hắt ra từ những cửa hiệu nhỏ, đêm khuya tiếng guốc gõ trên đường đá – Thạch Lam nắm bắt được linh hồn của phố cổ qua những chi tiết nhỏ nhất.</p>
    <p><strong>Hoài cổ và lo âu:</strong> Viết năm 1943, Thạch Lam đã thấy những thay đổi không thể tránh khỏi của thời cuộc. Ông viết với tình yêu và nỗi lo – sợ rằng những vẻ đẹp này sẽ bị mất đi.</p>
    <p><strong>Di sản văn học:</strong> Hơn 80 năm sau, đọc lại Thạch Lam người ta vẫn thấy như đang đứng giữa phố cổ một chiều đông năm nào – đó là dấu hiệu của một tác phẩm vĩnh cửu.</p>`
  },
  {
    id: 10, cat: "Văn Hóa", emoji: "🎭",
    color: "#2980B9", bg: "#EAF4FB",
    title: "Người Hà Nội",
    author: "Nhiều tác giả", year: "2000", pages: "300 trang",
    quick: "Chân dung tính cách và lối sống người Hà Nội",
    desc: "Khảo cứu sâu sắc về bản sắc con người Hà Nội qua các thế hệ – cái thanh lịch, tinh tế và cũng đầy mâu thuẫn của người Tràng An.",
    highlights: ["Phân tích tính cách người Hà Nội gốc và người nhập cư", "Sự biến đổi văn hóa trong thời đô thị hóa", "Chuẩn mực ứng xử và ngôn ngữ người Kinh thành"],
    content: `<p><strong>Tổng quan:</strong> Đây là công trình nghiên cứu văn hóa học đặt câu hỏi căn bản: "Người Hà Nội" là ai? Họ có gì khác biệt với người các vùng miền khác trong đất nước?</p>
    <p><strong>Nét thanh lịch Tràng An:</strong> "Chẳng thơm cũng thể hoa nhài / Dẫu không thanh lịch cũng người Tràng An" – câu ca dao nói lên kỳ vọng về người Hà Nội. Sách phân tích những biểu hiện cụ thể: cách ăn nói không to tiếng, cách cư xử tế nhị, cách mặc kỹ lưỡng ngay cả khi đi chợ.</p>
    <p><strong>Ngôn ngữ đặc trưng:</strong> Người Hà Nội gốc có cách phát âm và dùng từ riêng – không nói "con dao" mà nói "con dao", không nói "cái chăn" mà nói "cái chăn". Những âm sắc và vốn từ này đang dần mất đi trong thế hệ trẻ.</p>
    <p><strong>Văn hóa tiếp khách:</strong> Người Hà Nội xưa tiếp khách rất cầu kỳ – trà phải pha đúng cách, bánh kẹo phải đặt ra đĩa, không bao giờ mời khách ăn trực tiếp từ gói. Những quy tắc ngầm này tạo nên sự sang trọng đặc biệt.</p>
    <p><strong>Người Hà Nội "mới":</strong> Từ sau 1954, hàng triệu người từ các tỉnh đổ về Hà Nội – sự pha trộn này tạo ra một Hà Nội mới phong phú hơn nhưng cũng mất đi một số nét thuần túy cũ. Sách không phán xét mà chỉ ghi nhận sự biến đổi.</p>
    <p><strong>Hà Nội toàn cầu:</strong> Thế hệ Hà Nội trẻ ngày nay – đi du học, làm việc cho công ty nước ngoài, sống trong các khu đô thị mới – đang định hình một bản sắc Hà Nội thứ ba, khác với cả Hà Nội cổ lẫn Hà Nội bao cấp.</p>`
  },
  {
    id: 11, cat: "Văn Hóa", emoji: "🖼️",
    color: "#2980B9", bg: "#EAF4FB",
    title: "Tinh Hoa Hà Nội",
    author: "Nhiều tác giả", year: "2010", pages: "380 trang",
    quick: "Tổng hợp những tinh hoa văn hóa nghìn năm Thăng Long",
    desc: "Công trình tổng hợp quy mô về những tinh hoa văn hóa, nghệ thuật và tri thức của Hà Nội qua nghìn năm lịch sử.",
    highlights: ["Nghệ thuật truyền thống: tuồng, chèo, ca trù", "Thủ công mỹ nghệ các làng nghề quanh Hà Nội", "Kiến trúc và quy hoạch đô thị lịch sử"],
    content: `<p><strong>Tổng quan:</strong> Xuất bản nhân dịp Đại lễ 1000 năm Thăng Long, "Tinh Hoa Hà Nội" là công trình quy mô nhất từ trước đến nay tổng hợp các giá trị văn hóa, nghệ thuật và tri thức của Hà Nội.</p>
    <p><strong>Ca trù – tinh hoa âm nhạc:</strong> Ca trù (hát ả đào) là thể loại âm nhạc cung đình – dân gian độc đáo nhất của người Bắc Bộ, đặc biệt là Hà Nội. Sách giới thiệu chi tiết các làn điệu, nhạc cụ và nghệ thuật biểu diễn của ca trù – đã được UNESCO công nhận năm 2009.</p>
    <p><strong>Làng nghề quanh Hà Nội:</strong> Gốm Bát Tràng, lụa Vạn Phúc, nón Chuông, tranh Hàng Trống, khảm trai Chuyên Mỹ – mỗi làng nghề là một trường phái thủ công độc đáo đã tồn tại hàng trăm năm. Sách mô tả quy trình sản xuất và tinh thần nghề nghiệp của nghệ nhân.</p>
    <p><strong>Kiến trúc lịch sử:</strong> Văn Miếu – Quốc Tử Giám (1070), Hoàng thành Thăng Long, đình Kim Liên, chùa Một Cột – những công trình không chỉ đẹp mà còn chứa đựng triết lý về vũ trụ và xã hội của người xưa.</p>
    <p><strong>Tri thức và giáo dục:</strong> Hà Nội là trung tâm giáo dục của cả nước từ thời Lý – Quốc Tử Giám là trường đại học đầu tiên của Việt Nam. Truyền thống hiếu học và trọng tri thức là bản sắc sâu xa nhất của người Hà Nội.</p>
    <p><strong>Ẩm thực tinh hoa:</strong> Từ món ăn cung đình đến ẩm thực đường phố – Hà Nội là nơi hội tụ và chắt lọc tinh hoa ẩm thực từ khắp mọi miền, tạo nên một nền ẩm thực độc đáo không nơi nào có được.</p>`
  },

  // ── III. ẨM THỰC ──
  {
    id: 12, cat: "Ẩm Thực", emoji: "🍜",
    color: "#E67E22", bg: "#FEF3E2",
    title: "Phở – Tinh Hoa Ẩm Thực Việt",
    author: "Nguyễn Ngọc Tiến", year: "2018", pages: "220 trang",
    quick: "Lịch sử và nghệ thuật nấu phở Việt Nam",
    desc: "Hành trình khám phá nguồn gốc, lịch sử và nghệ thuật nấu món phở – linh hồn của ẩm thực Việt Nam và di sản văn hóa dân tộc.",
    highlights: ["Tranh luận về nguồn gốc phở: Việt, Hoa hay Pháp?", "Phở Hà Nội vs Phở Sài Gòn – hai trường phái", "Công thức nước dùng chuẩn và bí quyết nhà hàng"],
    content: `<p><strong>Tổng quan:</strong> Cuốn sách đặt câu hỏi: Phở ra đời từ đâu? Người Việt, người Hoa hay người Pháp đã "phát minh" ra món ăn quốc hồn quốc túy này?</p>
    <p><strong>Nguồn gốc – tranh luận lịch sử:</strong> Ba giả thuyết chính được phân tích kỹ: (1) Từ "pot-au-feu" của Pháp – món hầm bò của người Pháp được Việt hóa; (2) Từ "ngưu nhục phấn" của người Hoa; (3) Hoàn toàn là sáng tạo thuần Việt tại Nam Định đầu thế kỷ 20. Tác giả nghiêng về giả thuyết thứ ba có pha trộn yếu tố Hoa.</p>
    <p><strong>Phở Hà Nội:</strong> Nước dùng trong vắt, vị thanh ngọt tự nhiên từ xương. Bánh phở mỏng, mềm. Hành tươi và hành chần đặt gọn trên mặt. Không rau sống, không tương. Chỉ có giấm tỏi và ớt ngâm. Đây là "chính thống" của phở.</p>
    <p><strong>Phở Sài Gòn:</strong> Nước dùng ngọt đậm hơn (có đường), bánh phở to hơn. Kèm theo đĩa rau sống (giá, húng quế, ngò gai), tương đen, tương đỏ. Hai miền, hai triết lý ẩm thực – không ai đúng sai, chỉ là sự khác biệt văn hóa.</p>
    <p><strong>Nghệ thuật nấu nước dùng:</strong> Xương ống ninh 8-12 tiếng, gừng và hành tây nướng thơm, hoa hồi, quế, thảo quả, đinh hương rang nhẹ. Mỗi gia đình hàng phở giữ tỷ lệ gia vị như bí mật kinh doanh.</p>
    <p><strong>Phở toàn cầu:</strong> Từ Hà Nội đến New York, Paris, Sydney, Tokyo – phở đã có mặt ở hàng trăm quốc gia và được Michelin xếp hạng. Nhưng phở ngon nhất vẫn là những bát phở 5 giờ sáng ở phố cổ Hà Nội.</p>`
  },
  {
    id: 13, cat: "Ẩm Thực", emoji: "🥢",
    color: "#E67E22", bg: "#FEF3E2",
    title: "Văn Hóa Ẩm Thực Hà Nội",
    author: "Múi Nguyễn", year: "2015", pages: "260 trang",
    quick: "Bách khoa ẩm thực đường phố Hà Nội",
    desc: "Hành trình khám phá những món ăn đặc sắc của Hà Nội – từ bún thang, bánh cuốn đến kem Tràng Tiền và cốm Vòng.",
    highlights: ["Bản đồ ẩm thực theo từng con phố Hà Nội", "Câu chuyện văn hóa đằng sau từng món ăn", "Ăn theo mùa – triết lý ẩm thực người Hà Nội"],
    content: `<p><strong>Tổng quan:</strong> Cuốn sách là bản đồ ẩm thực toàn diện của Hà Nội – không chỉ ghi chép công thức mà còn kể câu chuyện văn hóa đằng sau mỗi món ăn và mỗi địa chỉ.</p>
    <p><strong>Bún thang – bữa ăn hoàng gia:</strong> Bún thang được coi là món ăn cầu kỳ nhất Hà Nội – nước dùng từ xương gà, tôm he, mực khô, củ cải muối. Toppings gồm gà xé, trứng tráng thái chỉ, giò lụa, nấm hương, tôm he, hành phi. Ăn phải thêm mắm tôm, rau mùi – thiếu một thứ là mất hương vị.</p>
    <p><strong>Bánh cuốn Thanh Trì:</strong> Chỉ riêng làng Thanh Trì mới làm được bánh cuốn mỏng và mềm đến vậy – bí quyết là gạo ngâm đủ giờ, tráng trên vải xô ướt, không nhân. Chấm với nước mắm pha giấm thanh, thêm chả quế và hành phi.</p>
    <p><strong>Cốm làng Vòng:</strong> Chỉ làm được vào tháng 8-9 âm lịch khi lúa nếp vào độ "đòng đòng". Rang, giã, sàng nhiều lần để hạt cốm xanh mướt, dẻo thơm. Ăn cốm phải gói trong lá sen, ăn với chuối tiêu chín – không cần thêm gì nữa.</p>
    <p><strong>Kem Tràng Tiền:</strong> Thương hiệu kem quốc dân từ thời bao cấp – kem que 2 tầng (xoài dứa hoặc sô cô la vani) giá rẻ mà ngon, xếp hàng dài là hình ảnh đặc trưng của Hà Nội một thời. Ngày nay vẫn còn ở 35 Tràng Tiền.</p>
    <p><strong>Hàng rong – linh hồn phố phố:</strong> Những gánh hàng rong với tiếng rao đặc trưng – "Ai bánh rán nào...", "Xôi lạc, xôi đỗ đây..." – là âm nhạc của phố phường Hà Nội, đang dần biến mất theo thời gian.</p>`
  },
  {
    id: 14, cat: "Ẩm Thực", emoji: "🌿",
    color: "#E67E22", bg: "#FEF3E2",
    title: "Ẩm Thực Đất Thăng Long",
    author: "Đinh Văn Tuấn", year: "2009", pages: "290 trang",
    quick: "Lịch sử ẩm thực kinh đô ngàn năm",
    desc: "Nghiên cứu về ẩm thực Thăng Long từ thời phong kiến đến hiện đại – những món ăn cung đình và dân dã tạo nên hồn ẩm thực Hà Nội.",
    highlights: ["Ẩm thực cung đình triều Lý – Trần – Lê – Nguyễn", "Ảnh hưởng của ẩm thực Hoa, Pháp, Ấn Độ", "Bảo tồn công thức cổ truyền trong thời hiện đại"],
    content: `<p><strong>Tổng quan:</strong> Lấy bối cảnh lịch sử làm khung, cuốn sách truy tìm nguồn gốc ẩm thực Hà Nội từ bếp cung đình thời Lý – Trần – Lê đến những quán ăn bình dân hiện đại.</p>
    <p><strong>Ẩm thực cung đình:</strong> Bếp hoàng cung thời Lê có hàng trăm đầu bếp chuyên trách – người nấu cơm, người làm canh, người chế biến đồ ngọt. Những món như nem công chả phượng (thực ra là nem làm từ thịt công nấu theo cách đặc biệt) đã thành thuật ngữ chỉ đồ ngon của vua chúa.</p>
    <p><strong>Từ cung đình ra dân gian:</strong> Nhiều món ăn cung đình dần phổ biến khi đầu bếp hoàng gia về hưu và truyền nghề. Bún thang vốn là món ăn của giới thượng lưu mới ra đến bình dân; bánh phu thê từ lễ vật cưới hỏi thành hàng quán.</p>
    <p><strong>Ảnh hưởng Pháp:</strong> Bánh mì Việt Nam là sự sáng tạo thiên tài – baguette Pháp được cải biến với bột pha thêm gạo cho nhẹ hơn, nhân là đồ Việt (giò, patê, rau thơm). Cà phê phin Việt Nam cũng từ cà phê Pháp mà ra.</p>
    <p><strong>Ảnh hưởng Hoa:</strong> Hủ tiếu, mì vằn thắn, bánh bao – những món Hoa được Việt hóa triệt để với gia vị và nước chấm Việt Nam. Làng Hàng Buồm (Hà Nội) từng là phố Tàu với nhiều tiệm ăn Trung Hoa nổi tiếng.</p>
    <p><strong>Thách thức bảo tồn:</strong> Nhiều công thức cổ truyền chỉ còn trong ký ức của các cụ già – khi họ ra đi, công thức cũng ra đi theo. Sách kêu gọi việc ghi chép, bảo tồn và truyền dạy như một trách nhiệm văn hóa.</p>`
  },
  {
    id: 15, cat: "Ẩm Thực", emoji: "🧆",
    color: "#E67E22", bg: "#FEF3E2",
    title: "Ăn Quà Hà Nội",
    author: "Băng Sơn", year: "1991", pages: "180 trang",
    quick: "Nghệ thuật ăn quà vặt của người Hà Nội",
    desc: "Khảo cứu thú vị về văn hóa ăn quà – những món ăn vặt đặc trưng của người Hà Nội và nghệ thuật thưởng thức chúng.",
    highlights: ["Bánh rán, bánh trôi, bánh chay theo mùa", "Xôi ngũ sắc, xôi xéo, xôi lạc", "Chè kho, chè đỗ đen, chè sen Long An"],
    content: `<p><strong>Tổng quan:</strong> Nhà văn Băng Sơn – "ông già Hà Nội" với hàng trăm bài viết về văn hóa thủ đô – dành riêng cuốn sách này để nói về những món quà vặt đặc trưng của Hà Nội.</p>
    <p><strong>Văn hóa "ăn quà":</strong> Người Hà Nội không chỉ ăn ba bữa – họ có truyền thống "ăn quà" vào các thời điểm trong ngày: sáng sớm xôi, 9 giờ bánh rán, trưa kem, chiều tối chè. Đây là nét văn hóa riêng không nơi nào có.</p>
    <p><strong>Xôi – vua quà sáng:</strong> Xôi xéo (đỗ xanh, hành phi, mỡ gà), xôi gấc (đỏ, dẻo, thơm nếp), xôi ngũ sắc (5 màu từ 5 loại nguyên liệu tự nhiên), xôi lạc, xôi đỗ đen – mỗi loại có hương vị và dịp ăn riêng.</p>
    <p><strong>Bánh theo mùa:</strong> Tháng 3 âm lịch: bánh trôi, bánh chay (Tết Hàn thực); tháng 7: bánh nếp, bánh lá gai; tháng 8: bánh Trung Thu đặc biệt; Tết Nguyên Đán: bánh chưng. Lịch bánh là lịch văn hóa của người Việt.</p>
    <p><strong>Chè – nghệ thuật thưởng thức:</strong> Chè kho (đỗ xanh nấu đặc, khuôn thành miếng, ăn ngày Tết), chè đỗ đen nước cốt dừa, chè sen Long An (sen không hạt, chỉ có mùi hương), chè bưởi (múi bưởi tách trắng tinh, nước đường thơm mùi hoa bưởi).</p>
    <p><strong>Hàng rong quà vặt:</strong> "Ai bánh trôi nào..." – tiếng rao của bà hàng rong gánh bánh trôi tháng 3 là âm thanh đặc trưng của Hà Nội xưa. Sách ghi lại những tiếng rao đặc trưng sắp thất truyền này như một di sản phi vật thể.</p>`
  },

  // ── IV. TRANG PHỤC ──
  {
    id: 16, cat: "Trang Phục", emoji: "👘",
    color: "#8E44AD", bg: "#F5EEF8",
    title: "Ngàn Năm Áo Mũ",
    author: "Trần Quang Đức", year: "2013", pages: "480 trang",
    quick: "Lịch sử trang phục Việt Nam qua nghìn năm",
    desc: "Công trình nghiên cứu đồ sộ về lịch sử trang phục và mũ mão Việt Nam từ thời cổ đại đến cuối thế kỷ 19 – tái hiện hình ảnh người Việt qua từng thời đại.",
    highlights: ["Trang phục cung đình từ thời Lý đến Nguyễn", "Nguồn gốc thực sự của áo dài Việt Nam", "Ảnh hưởng trang phục Trung Hoa và sự biệt hóa"],
    content: `<p><strong>Tổng quan:</strong> Đây là công trình nghiên cứu lớn nhất từ trước đến nay về lịch sử trang phục Việt Nam, do tác giả Trần Quang Đức thực hiện trong nhiều năm với nguồn tư liệu phong phú từ thư tịch cổ, tranh vẽ và di vật khảo cổ.</p>
    <p><strong>Thời Lý – Trần (thế kỷ 11-14):</strong> Triều đình Lý học tập mạnh từ Trung Hoa – long bào màu vàng, mũ miện, đai ngọc... nhưng dần dần có những biệt hóa riêng. Người dân mặc áo giao lĩnh (chéo cài phải), vải đa phần là gai hoặc tơ thô.</p>
    <p><strong>Thời Lê sơ (thế kỷ 15):</strong> Sau khi đuổi giặc Minh, vua Lê cải cách trang phục triệt để – xây dựng hệ thống phẩm phục đồng bộ, phân biệt rõ ràng theo phẩm cấp. Màu sắc, chất liệu, họa tiết đều có quy định nghiêm ngặt.</p>
    <p><strong>Sự ra đời của áo dài:</strong> Tiết lộ gây ngạc nhiên – áo dài hiện đại KHÔNG phải là trang phục "nghìn năm". Áo dài cải cách (áo Lemur) ra đời năm 1934 do họa sĩ Cát Tường thiết kế dưới ảnh hưởng thời trang Pháp, dựa trên áo ngũ thân truyền thống. Áo ngũ thân mới là trang phục truyền thống thực sự.</p>
    <p><strong>Trang phục dân gian:</strong> Áo tứ thân, yếm đào, khăn mỏ quạ của phụ nữ Bắc Bộ – những trang phục đồng ruộng thực dụng nhưng rất đẹp khi kết hợp đúng cách.</p>
    <p><strong>Giá trị:</strong> Sách được minh họa phong phú (hàng trăm hình ảnh phục dựng) và là tài liệu tham chiếu không thể thiếu cho các nhà thiết kế thời trang muốn khai thác di sản văn hóa Việt.</p>`
  },
  {
    id: 17, cat: "Trang Phục", emoji: "🪡",
    color: "#8E44AD", bg: "#F5EEF8",
    title: "Trang Phục Thăng Long – Hà Nội",
    author: "Đoàn Thị Tình", year: "2006", pages: "320 trang",
    quick: "Thời trang kinh đô qua các triều đại",
    desc: "Nghiên cứu đặc thù về trang phục của người Kinh thành Thăng Long – nơi hội tụ tinh hoa thời trang cả nước qua các thời kỳ lịch sử.",
    highlights: ["Phố Hàng Ngang – Hàng Đào: trung tâm thời trang xưa", "Trang phục người Hà Nội dưới thời Pháp thuộc", "Sự pha trộn thẩm mỹ Đông – Tây đầu thế kỷ 20"],
    content: `<p><strong>Tổng quan:</strong> Tập trung vào vùng đất kinh đô – nơi trang phục không chỉ là ăn mặc mà còn là ngôn ngữ về địa vị, thẩm mỹ và bản sắc vùng miền.</p>
    <p><strong>Đặc trưng người Hà Nội:</strong> Người Hà Nội xưa nổi tiếng với cách ăn mặc kỹ lưỡng – chọn vải tốt, màu sắc nhã nhặn (không lòe loẹt), đường may tinh tế, không bao giờ mặc quần áo nhàu nát ra đường dù chỉ đi chợ. Đây là biểu hiện của "thanh lịch Tràng An".</p>
    <p><strong>Phố Hàng Ngang – Hàng Đào:</strong> Trung tâm thời trang của Hà Nội xưa – nơi buôn bán lụa là gấm vóc từ khắp nơi. Hàng Đào bán vải màu đỏ và hồng (đào), Hàng Ngang bán hàng ngang (vải dệt ngang). Những gia đình buôn vải lớn như Cự Doanh, Phúc Lợi định hình thị hiếu thời trang kinh thành.</p>

  // Highlights
  const hlEl = document.getElementById('mHighlights');
  if (b.highlights && b.highlights.length) {
    hlEl.innerHTML = `<div class="highlights-box">
      <div class="hl-title">⭐ Điểm nổi bật</div>
      <ul>${b.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
    </div>`;
  } else {
    hlEl.innerHTML = '';
  }

  document.getElementById('mContent').innerHTML = b.content;
  updateFavModalBtn();

  // Audio reset
  isPlaying = false;
  clearInterval(demoInterval);
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('audioTime').textContent = 'Chạm ▶ để nghe thử';

  // QR Code
  generateQR(b);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function generateQR(book) {
  const qrContainer = document.getElementById('qrContainer');
  qrContainer.innerHTML = '';

  // URL = trang web hiện tại + hash book id
  const url = window.location.href.split('#')[0] + '#book-' + book.id;
  document.getElementById('qrUrl').textContent = url.length > 50 ? url.substring(0, 47) + '...' : url;

  try {
    new QRCode(qrContainer, {
      text: url,
      width: 72,
      height: 72,
      colorDark: '#1A1A1A',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    qrContainer.innerHTML = '<div style="font-size:10px;color:#888;text-align:center;padding:4px;">QR<br>Code</div>';
  }
}

function updateFavModalBtn() {
  const btn = document.getElementById('favModalBtn');
  const isFav = favorites.includes(currentBook.id);
  btn.textContent = isFav ? '❤️ Đã yêu thích' : '🤍 Yêu thích';
  btn.classList.toggle('fav-active', isFav);
}

function toggleFavModal() {
  if (!currentBook) return;
  if (favorites.includes(currentBook.id)) {
    favorites = favorites.filter(f => f !== currentBook.id);
  } else {
    favorites.push(currentBook.id);
  }
  localStorage.setItem('favs_hn', JSON.stringify(favorites));
  updateFavModalBtn();
  renderBooks();
}

function togglePlay() {
  if (!isPlaying) {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('audioTime').textContent = 'Đang phát demo...';
    let pct = 0;
    demoInterval = setInterval(() => {
      pct += 0.5;
      document.getElementById('progressFill').style.width = pct + '%';
      const mins = Math.floor(pct / 100 * 120);
      const secs = Math.floor((pct / 100 * 7200) % 60);
      document.getElementById('audioTime').textContent =
        `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')} / 120:00 (demo)`;
      if (pct >= 100) {
        clearInterval(demoInterval);
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('audioTime').textContent = 'Đã kết thúc demo';
      }
    }, 100);
  } else {
    isPlaying = false;
    clearInterval(demoInterval);
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('audioTime').textContent = 'Tạm dừng';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  isPlaying = false;
  clearInterval(demoInterval);
}

function shareBook() {
  if (!currentBook) return;
  const url = window.location.href.split('#')[0] + '#book-' + currentBook.id;
  if (navigator.share) {
    navigator.share({ title: currentBook.title, text: currentBook.quick, url: url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('✅ Đã sao chép link!'));
  }
}

document.getElementById('searchInput').addEventListener('input', renderBooks);
renderBooks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Viện Sách Hà Nội</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-light: #E8D5D3;
    --gold: #B8860B;
    --gold-light: #F5F0E8;
    --ink: #1A1A1A;
    --ink-mid: #555;
    --ink-soft: #888;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E8E4DC;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 8px 28px rgba(0,0,0,0.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--ink);
    color: white;
    padding: 20px 16px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo-icon { font-size: 22px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
  .logo-sub { font-size: 11px; color: #aaa; margin-top: 1px; letter-spacing: 0.5px; text-transform: uppercase; }
  .search-bar {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; margin-bottom: 16px;
  }
  .search-bar input {
    background: none; border: none; outline: none;
    color: white; font-family: inherit; font-size: 14px; flex: 1;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
  .search-icon { font-size: 16px; opacity: 0.5; }

  /* CATEGORIES TAB */
  .cat-tabs {
    display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0; padding: 11px 14px;
    font-size: 12.5px; font-weight: 500; color: rgba(255,255,255,0.5);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .cat-tab.active { color: white; border-bottom-color: var(--red); }
  .cat-tab:hover { color: rgba(255,255,255,0.85); }

  /* MAIN */
  .main { padding: 20px 16px 80px; max-width: 680px; margin: 0 auto; }

  /* SECTION TITLE */
  .section-title {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; margin-top: 4px;
  }
  .section-title h2 { font-size: 16px; font-weight: 700; color: var(--ink); }
  .section-title .count {
    background: var(--red-light); color: var(--red);
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  }

  /* BOOK CARD */
  .book-list { display: flex; flex-direction: column; gap: 10px; }
  .book-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid var(--border);
    padding: 14px; display: flex; gap: 12px; cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .book-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .book-cover {
    width: 56px; height: 76px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative; overflow: hidden;
  }
  .book-cover::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: rgba(0,0,0,0.15);
  }
  .book-info { flex: 1; min-width: 0; }
  .book-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.35; margin-bottom: 4px; }
  .book-category { font-size: 11px; color: var(--red); font-weight: 500; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
  .book-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .book-meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .audio-badge {
    background: var(--gold-light); color: var(--gold);
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; display: flex; align-items: center; gap: 4px;
  }
  .fav-btn {
    margin-left: auto; background: none; border: none;
    font-size: 16px; cursor: pointer; padding: 2px;
    opacity: 0.3; transition: opacity 0.2s, transform 0.15s;
  }
  .fav-btn.active { opacity: 1; }
  .fav-btn:hover { transform: scale(1.2); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 0 0 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header { padding: 16px 16px 0; }
  .modal-cat { font-size: 11px; color: var(--red); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.3; color: var(--ink); margin-bottom: 12px; }
  .modal-cover-row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 0 16px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-cover {
    width: 80px; height: 108px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    position: relative; overflow: hidden; box-shadow: 4px 4px 16px rgba(0,0,0,0.15);
  }
  .modal-cover::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: rgba(0,0,0,0.15);
  }
  .modal-quick-info { flex: 1; }
  .modal-quick-info p { font-size: 13px; color: var(--ink-mid); line-height: 1.6; }

  /* AUDIO PLAYER */
  .audio-section {
    margin: 16px; background: var(--ink); border-radius: 12px; padding: 16px; color: white;
  }
  .audio-title { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .audio-controls { display: flex; align-items: center; gap: 12px; }
  .play-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--red);
    border: none; color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.15s, background 0.15s;
  }
  .play-btn:hover { transform: scale(1.07); background: #a93226; }
  .audio-info { flex: 1; }
  .audio-progress {
    height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin-bottom: 6px; overflow: hidden;
  }
  .audio-progress-fill { height: 100%; background: var(--red); width: 0%; border-radius: 2px; transition: width 0.3s; }
  .audio-time { font-size: 11px; color: rgba(255,255,255,0.4); }
  .audio-note { font-size: 11.5px; color: rgba(255,255,255,0.35); margin-top: 10px; line-height: 1.5; }

  /* CONTENT */
  .content-section { padding: 0 16px; }
  .content-label { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 10px; margin-top: 16px; }
  .content-text { font-size: 14px; color: var(--ink-mid); line-height: 1.8; }
  .content-text p { margin-bottom: 12px; }

  /* MODAL ACTIONS */
  .modal-actions { display: flex; gap: 8px; padding: 16px; margin-top: 4px; }
  .action-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid var(--border);
    background: none; font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    color: var(--ink-mid); transition: all 0.15s;
  }
  .action-btn:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .action-btn.fav-active { background: var(--red-light); border-color: var(--red); color: var(--red); }

  .close-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%; background: var(--border);
    border: none; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--ink-mid);
  }
  .modal { position: relative; }

  /* BADGE COUNT FIXED */
  #results-count { display: none; }
  .showing { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-icon">📚</div>
    <div>
      <div class="logo-text">Thư Viện Sách Hà Nội</div>
      <div class="logo-sub">Vừa Đọc · Vừa Nghe · Miễn Phí</div>
    </div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Tìm tên sách...">
  </div>
  <div class="cat-tabs" id="catTabs"></div>
</div>

<div class="main">
  <div class="section-title">
    <h2 id="sectionTitle">Tất cả sách</h2>
    <span class="count" id="bookCount">0 cuốn</span>
  </div>
  <div class="book-list" id="bookList"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">📭</div>
    <p>Không tìm thấy sách nào</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="close-btn" onclick="closeModalBtn()">✕</button>
    <div class="modal-header">
      <div class="modal-cat" id="mCat"></div>
      <div class="modal-title" id="mTitle"></div>
    </div>
    <div class="modal-cover-row">
      <div class="modal-cover" id="mCover"></div>
      <div class="modal-quick-info"><p id="mQuick"></p></div>
    </div>
    <div class="audio-section">
      <div class="audio-title">🎵 Nghe Sách</div>
      <div class="audio-controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="audio-info">
          <div class="audio-progress"><div class="audio-progress-fill" id="progressFill"></div></div>
          <div class="audio-time" id="audioTime">Chạm ▶ để nghe thử</div>
        </div>
      </div>
      <div class="audio-note" id="audioNote">💡 Để nghe đầy đủ: tải file MP3 lên Google Drive → dán link vào đây.</div>
    </div>
    <div class="content-section">
      <div class="content-label">📖 Nội Dung Tóm Tắt</div>
      <div class="content-text" id="mContent"></div>
    </div>
    <div class="modal-actions">
      <button class="action-btn" id="favModalBtn" onclick="toggleFavModal()">🤍 Yêu thích</button>
      <button class="action-btn" onclick="shareBook()">📤 Chia sẻ</button>
    </div>
  </div>
</div>

    content: `<p><strong>Tổng quan:</strong> Cuốn sách là công trình nghiên cứu công phu, tập hợp nhiều bài viết chuyên sâu về lịch sử hình thành và phát triển của vùng đất Thăng Long – Hà Nội suốt chiều dài ngàn năm.</p><p><strong>Nội dung chính:</strong> Từ quyết định dời đô của vua Lý Thái Tổ năm 1010 đến những biến cố lịch sử qua các triều đại Lý, Trần, Lê, Nguyễn – tất cả được phân tích chi tiết dựa trên tài liệu gốc và di chỉ khảo cổ.</p><p><strong>Điểm nổi bật:</strong> Sách bao gồm bản đồ cổ, hình ảnh di tích, và những ghi chép của các học giả người Pháp thời thuộc địa – nguồn tư liệu quý hiếm giúp người đọc hình dung Hà Nội của thế kỷ trước.</p><p><strong>Giá trị:</strong> Đây là tài liệu tham khảo không thể thiếu cho ai muốn hiểu sâu về bản sắc văn hóa và địa chính trị của thủ đô Việt Nam.</p>`

    content: `<p><strong>Tổng quan:</strong> Cuốn biên niên sử này ghi lại những sự kiện trọng đại đã định hình Hà Nội qua từng thế kỷ, từ thời Pháp thuộc, kháng chiến, đến đổi mới và hội nhập quốc tế.</p><p><strong>Giai đoạn Pháp thuộc:</strong> Hà Nội chuyển mình từ một kinh thành phong kiến sang thành phố thuộc địa với quy hoạch theo kiểu Âu châu – những con phố thẳng tắp, biệt thự Pháp, và hệ thống cấp thoát nước hiện đại đầu tiên.</p><p><strong>Giai đoạn kháng chiến:</strong> Hình ảnh "60 ngày đêm khói lửa" năm 1946 và tinh thần "Quyết tử để Tổ quốc quyết sinh" được tái hiện qua lời kể của nhân chứng lịch sử.</p><p><strong>Thời đại mới:</strong> Hà Nội mở rộng về phía tây, hiện đại hóa hạ tầng nhưng vẫn gìn giữ linh hồn 36 phố phường.</p>`

    content: `<p><strong>Tổng quan:</strong> "Búp Sen Xanh" của nhà văn Sơn Tùng là cuốn tiểu thuyết lịch sử nổi tiếng nhất về thời thơ ấu và thanh niên của Chủ tịch Hồ Chí Minh.</p><p><strong>Hành trình tuổi thơ:</strong> Từ làng Sen (Nghệ An) đến Huế, rồi vào Nam – tác phẩm khắc họa sâu sắc quá trình hình thành nhân cách, lý tưởng của cậu bé Nguyễn Sinh Cung trong bối cảnh đất nước dưới ách thực dân.</p><p><strong>Giá trị văn học:</strong> Ngôn ngữ giàu cảm xúc, chi tiết chân thực được dựa trên nhiều năm tác giả đi điền dã, gặp gỡ những người từng quen biết gia đình Bác.</p><p><strong>Ý nghĩa:</strong> Cuốn sách không chỉ là tiểu sử mà còn là bức tranh về xã hội Việt Nam cuối thế kỷ 19, đầu thế kỷ 20 – những mâu thuẫn giai cấp, khát vọng độc lập và tình yêu nước sâu sắc.</p>`

    quick: "Khám phá thế giới tâm linh người Hà Nội",
    desc: "Nghiên cứu về hệ thống tín ngưỡng dân gian phong phú của người Hà Nội – từ thờ thần, thờ Mẫu đến những tục lệ độc đáo gắn với đời sống hằng ngày.",
    content: `<p><strong>Tổng quan:</strong> Tín ngưỡng dân gian là một phần không thể tách rời của đời sống người Hà Nội – từ bàn thờ tổ tiên trong mỗi gia đình đến những ngôi đền, ngôi chùa trên từng con phố.</p><p><strong>Tứ trấn Thăng Long:</strong> Bốn ngôi đền thiêng bảo vệ bốn phương thành Thăng Long – đền Bạch Mã (đông), đền Voi Phục (tây), đền Kim Liên (nam), đền Quán Thánh (bắc) – với những câu chuyện huyền thoại hấp dẫn.</p><p><strong>Thờ Mẫu:</strong> Tín ngưỡng thờ Tứ Phủ đặc trưng của người Bắc Bộ – thực hành hầu đồng và lên đồng được UNESCO công nhận là di sản văn hóa phi vật thể.</p><p><strong>Thần thành hoàng:</strong> Mỗi làng xã xung quanh Hà Nội đều thờ thần thành hoàng riêng – nhân vật lịch sử, anh hùng dân tộc hoặc thần tự nhiên. Cuốn sách điểm qua hàng trăm vị thần và sự tích của họ.</p>`
  },
  {
    id: 18, cat: "Phong Tục & Lễ Hội", emoji: "🌺",
    color: "#16A085", bg: "#E8F8F5",
    title: "Lễ Hội Dân Gian Hà Nội",
    quick: "Không khí lễ hội đặc sắc của thủ đô",
    desc: "Ghi chép sống động về không khí lễ hội dân gian Hà Nội – từ chuẩn bị đến diễn ra, tất cả được khắc họa qua lăng kính của người trong cuộc.",
    content: `<p><strong>Tổng quan:</strong> Khác với phương pháp học thuật, cuốn sách này tiếp cận lễ hội dân gian qua góc nhìn của người tham dự – cảm xúc, không khí và những khoảnh khắc đáng nhớ.</p><p><strong>Mùa lễ hội:</strong> Từ mùng 6 tháng giêng (khai hội Gióng) đến tháng ba (chùa Hương), mùa lễ hội của Hà Nội kéo dài cả mùa xuân – mỗi lễ hội là một bức tranh văn hóa độc đáo.</p><p><strong>Trò chơi dân gian:</strong> Đấu vật, chơi ô ăn quan, thả diều, kéo co – những trò chơi dân gian gắn liền với lễ hội đang dần được phục hồi sau nhiều thập kỷ bị quên lãng.</p><p><strong>Âm nhạc và nghệ thuật:</strong> Hát quan họ, hát chèo, múa rồng, múa lân – những loại hình nghệ thuật biểu diễn đặc trưng làm cho lễ hội Hà Nội trở nên sống động và hấp dẫn.</p><p><strong>Thay đổi hiện đại:</strong> Sách cũng thẳng thắn nhìn nhận những biến tướng và vấn đề của lễ hội hiện đại – từ chen lấn, thương mại hóa đến việc mất đi ý nghĩa tâm linh ban đầu.</p>`
  }
];

const CATS = ["Tất cả", "Lịch Sử", "Văn Hóa", "Ẩm Thực", "Trang Phục", "Phong Tục & Lễ Hội"];
let currentCat = "Tất cả";
let currentBook = null;
let favorites = JSON.parse(localStorage.getItem('favs') || '[]');
let isPlaying = false;

// BUILD TABS
const tabsEl = document.getElementById('catTabs');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-tab' + (cat === 'Tất cả' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => setCategory(cat);
  tabsEl.appendChild(btn);
});

function setCategory(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  renderBooks();
}

function renderBooks() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let books = BOOKS;
  if (currentCat !== 'Tất cả') books = books.filter(b => b.cat === currentCat);
  if (query) books = books.filter(b => b.title.toLowerCase().includes(query) || b.desc.toLowerCase().includes(query));

  const title = document.getElementById('sectionTitle');
  const count = document.getElementById('bookCount');
  title.textContent = currentCat === 'Tất cả' ? 'Tất cả sách' : currentCat;
  count.textContent = books.length + ' cuốn';

  const list = document.getElementById('bookList');
  const empty = document.getElementById('emptyState');

  if (books.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = books.map(b => `
    <div class="book-card" onclick="openBook(${b.id})">
      <div class="book-cover" style="background:${b.bg}; color:${b.color}">${b.emoji}</div>
      <div class="book-info">
        <div class="book-category">${b.cat}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-desc">${b.desc}</div>
        <div class="book-meta">
          <span class="audio-badge">🎵 Có audio</span>
          <button class="fav-btn ${favorites.includes(b.id) ? 'active' : ''}"
            onclick="event.stopPropagation();toggleFav(${b.id},this)">
            ${favorites.includes(b.id) ? '❤️' : '🤍'}
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFav(id, btn) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    btn.textContent = '🤍';
    btn.classList.remove('active');
  } else {
    favorites.push(id);
    btn.textContent = '❤️';
    btn.classList.add('active');
  }
  localStorage.setItem('favs', JSON.stringify(favorites));
  if (currentBook && currentBook.id === id) updateFavModalBtn();
}

function openBook(id) {
  currentBook = BOOKS.find(b => b.id === id);
  if (!currentBook) return;
  const b = currentBook;

  document.getElementById('mCat').textContent = b.cat;
  document.getElementById('mTitle').textContent = b.title;
  document.getElementById('mCover').style.cssText = `background:${b.bg};color:${b.color};font-size:36px`;
  document.getElementById('mCover').textContent = b.emoji;
  document.getElementById('mQuick').textContent = b.quick;
  document.getElementById('mContent').innerHTML = b.content;
  updateFavModalBtn();
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('audioTime').textContent = 'Chạm ▶ để nghe thử';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateFavModalBtn() {
  const btn = document.getElementById('favModalBtn');
  const isFav = favorites.includes(currentBook.id);
  btn.textContent = isFav ? '❤️ Đã yêu thích' : '🤍 Yêu thích';
  btn.classList.toggle('fav-active', isFav);
}

function toggleFavModal() {
  if (!currentBook) return;
  const el = document.querySelector(`.book-card .fav-btn`);
  toggleFavInList(currentBook.id);
  updateFavModalBtn();
}

function toggleFavInList(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('favs', JSON.stringify(favorites));
  renderBooks();
}

let demoInterval = null;
function togglePlay() {
  if (!isPlaying) {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('audioTime').textContent = 'Đang phát demo...';
    let pct = 0;
    demoInterval = setInterval(() => {
      pct += 0.5;
      document.getElementById('progressFill').style.width = pct + '%';
      const mins = Math.floor(pct / 100 * 120);
      document.getElementById('audioTime').textContent = `${mins}:00 / 120:00 (demo)`;
      if (pct >= 100) { clearInterval(demoInterval); isPlaying = false; document.getElementById('playBtn').textContent = '▶'; }
    }, 100);
  } else {
    isPlaying = false;
    clearInterval(demoInterval);
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('audioTime').textContent = 'Tạm dừng';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  isPlaying = false;
  clearInterval(demoInterval);
}

function shareBook() {
  if (!currentBook) return;
  if (navigator.share) {
    navigator.share({ title: currentBook.title, text: currentBook.quick, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('Đã sao chép link!'));
  }
}

document.getElementById('searchInput').addEventListener('input', renderBooks);

// INIT
renderBooks();
</script>
</body>
</html>
